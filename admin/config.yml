# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: kivsyakMEOW/stranichka
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/097dded9-b5f1-4977-943e-57292c1afd87/pkce
  auth_token_endpoint: /sites/097dded9-b5f1-4977-943e-57292c1afd87/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://silly-hotteok-bedd72.netlify.app

media_folder: "images"
public_folder: "/images"

collections:
  - name: "home"
    label: "Главная страница"
    files:
      - file: "content/home.json"
        label: "Главная"
        name: "home"
        fields:
          - {label: "Название клана (маленькая строка сверху)", name: "eyebrow", widget: "string"}
          - {label: "Заголовок (имя персонажа)", name: "title", widget: "string"}
          - {label: "Подзаголовок", name: "subtitle", widget: "text"}

  - name: "personal"
    label: "Личное"
    files:
      - file: "content/personal.json"
        label: "Текст раздела «Личное»"
        name: "personal"
        fields:
          - {label: "Абзацы (каждый с новой строки)", name: "body", widget: "text"}

  - name: "kittenhood"
    label: "История: Котячество"
    folder: "content/kittenhood"
    create: true
    format: "json"
    slug: "{{fields.order}}-{{slug}}"
    fields:
      - {label: "Порядок (1, 2, 3...)", name: "order", widget: "number", default: 1}
      - {label: "Заголовок эпизода", name: "title", widget: "string"}
      - {label: "Текст", name: "text", widget: "text"}
      - {label: "Изображение", name: "image", widget: "image", required: false}

  - name: "adulthood"
    label: "История: Взрослая жизнь"
    folder: "content/adulthood"
    create: true
    format: "json"
    slug: "{{fields.order}}-{{slug}}"
    fields:
      - {label: "Порядок (1, 2, 3...)", name: "order", widget: "number", default: 1}
      - {label: "Заголовок эпизода", name: "title", widget: "string"}
      - {label: "Текст", name: "text", widget: "text"}
      - {label: "Изображение", name: "image", widget: "image", required: false}

  - name: "gallery"
    label: "Галерея скриншотов"
    folder: "content/gallery"
    create: true
    format: "json"
    slug: "{{slug}}"
    fields:
      - {label: "Скриншот", name: "image", widget: "image"}
      - {label: "Подпись (не обязательно)", name: "caption", widget: "string", required: false}
